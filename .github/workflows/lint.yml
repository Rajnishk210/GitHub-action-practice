# What is the goal of your workflow
# Goal: When someone changes the Python code, the linter will check the syntax, format, and indentation(Linting)
# is correct or not
name: Auto Linter

on: 
  push: 
    paths: "*.py"
jobs:
  code:
    runs-on: ubuntu-latest #runner
    steps:
    #this step is automatically clones the code of the current branch into the runner
      - name: checkout/clone the code
        uses: actions/checkout@v7
      - name: install linter
        run: pip install ruff
      - name: check errors
        run: ruff check . 
      
